version: "1"

services:

  # ── 1. BACKEND (FastAPI / Uvicorn) ───────────────────────────────────────
  - type: web
    name: chargeback-api
    runtime: python
    region: oregon
    plan: starter
    buildCommand: |
      cd backend
      pip install -r requirements.txt
    startCommand: |
      cd backend
      uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      - key: APP_NAME
        value: ChargebackDefender
      - key: DATABASE_URL
        fromDatabase:
          name: chargeback-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NASIO_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false

  # ── 2. FRONTEND (Vite/React — Static Site) ───────────────────────────────
  - type: web
    name: chargeback-frontend
    runtime: static
    # region: oregon  <-- REMOVED: Static sites don't use regions
    plan: free
    buildCommand: |
      cd frontend
      npm install
      npm run build
    staticPublishPath: ./frontend/dist
    autoDeploy: true

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        # This will point to your backend service name within Render
        value: https://chargeback-api.onrender.com/api

# ── 3. DATABASE (Managed PostgreSQL) ─────────────────────────────────────
databases:
  - name: chargeback-db
    databaseName: chargebackdb
    user: chargebackuser
    region: oregon
    plan: free