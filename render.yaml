# render.yaml — ChargebackDefender Blueprint
# Deploy everything with: render blueprint sync
# Docs: https://render.com/docs/blueprint-spec

version: "1"

services:

  # ── 1. BACKEND (FastAPI / Uvicorn) ───────────────────────────────────────
  - type: web
    name: chargeback-api
    runtime: python
    region: oregon
    plan: starter          # $7/mo — upgrade to standard for production
    buildCommand: |
      cd backend
      pip install -r requirements.txt
    startCommand: |
      cd backend
      uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      - key: APP_NAME
        value: ChargebackDefender

      - key: DEBUG
        value: "false"

      # Injected automatically by Render when linked to the DB below
      - key: DATABASE_URL
        fromDatabase:
          name: chargeback-db
          property: connectionString

      # Set these manually in Render Dashboard → Environment
      - key: JWT_SECRET_KEY
        generateValue: true          # Render auto-generates a secure value

      - key: ANTHROPIC_API_KEY
        sync: false                  # Set manually in dashboard

      - key: NASIO_WEBHOOK_SECRET
        sync: false

      - key: NASIO_COMMUNITY_SLUG
        value: ecommerce-defender-room

      - key: STRIPE_SECRET_KEY
        sync: false

      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      - key: GOOGLE_VISION_KEY
        sync: false

      - key: USE_GOOGLE_VISION
        value: "false"

  # ── 2. FRONTEND (Vite/React — Static Site) ───────────────────────────────
  - type: web
    name: chargeback-frontend
    runtime: static
    region: oregon
    plan: free              # Static sites are free on Render
    buildCommand: |
      cd frontend
      npm install
      npm run build
    staticPublishPath: ./frontend/dist
    autoDeploy: true

    routes:
      # SPA fallback — all routes serve index.html
      - type: rewrite
        source: /*
        destination: /index.html

    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff

    envVars:
      - key: VITE_API_URL
        # Point to your backend URL after first deploy
        value: https://chargeback-api.onrender.com/api

  # ── 3. DATABASE (Managed PostgreSQL) ─────────────────────────────────────
databases:
  - name: chargeback-db
    databaseName: chargebackdb
    user: chargebackuser
    region: oregon
    plan: free              # 256MB — upgrade to starter ($7/mo) for production
    ipAllowList: []         # Allow all (internal access only via Render network)
