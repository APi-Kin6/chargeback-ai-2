version: "1"

services:
  # ── 1. BACKEND (FastAPI) ────────────────────────────────────────────────
  - type: web
    name: chargeback-api
    runtime: python
    region: oregon
    plan: starter
    buildCommand: |
      cd backend
      python -m pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: |
      cd backend
      uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: APP_NAME
        value: ChargebackDefender
      - key: DATABASE_URL
        fromDatabase:
          name: chargeback-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NASIO_WEBHOOK_SECRET
        sync: false

  # ── 2. FRONTEND (Vite/React) ─────────────────────────────────────────────
  - type: static_site
    name: chargeback-frontend
    buildCommand: |
      cd frontend
      npm install
      npm run build
    staticPublishPath: ./frontend/dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://chargeback-api.onrender.com/api

# ── 3. DATABASE (Managed PostgreSQL) ───────────────────────────────────────
databases:
  - name: chargeback-db
    databaseName: chargebackdb
    user: chargebackuser
    region: oregon
    plan: free