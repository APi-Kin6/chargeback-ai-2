# ── 2. FRONTEND (Vite/React — Static Site) ───────────────────────────────
  - type: static_site
    name: chargeback-frontend
    buildCommand: |
      cd frontend
      npm install
      npm run build
    staticPublishPath: ./frontend/dist
    autoDeploy: true

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        value: https://chargeback-api.onrender.com/api